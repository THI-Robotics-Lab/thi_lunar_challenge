controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    leg_position_controller:
      type: position_controllers/JointGroupPositionController

joint_state_broadcaster:
  ros__parameters:
    use_sim_time: true

diff_drive_controller:
  ros__parameters:
    use_sim_time: true
    left_wheel_names: ["front_left_wheel_joint", "rear_left_wheel_joint"]
    right_wheel_names: ["front_right_wheel_joint", "rear_right_wheel_joint"]
    wheel_separation: 0.28
    wheel_radius: 0.08
    wheels_per_side: 2
    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_link
    enable_odom_tf: true
    open_loop: false
    cmd_vel_timeout: 0.5
    linear.x.has_velocity_limits: true
    linear.x.max_velocity: 0.6
    linear.x.min_velocity: -0.6
    angular.z.has_velocity_limits: true
    angular.z.max_velocity: 1.2
    angular.z.min_velocity: -1.2

leg_position_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - front_left_leg_joint
      - front_right_leg_joint
      - rear_left_leg_joint
      - rear_right_leg_joint
    interface_name: position
